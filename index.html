<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AOH-FOD V830 | FINAL STABLE</title>
    <style>
        :root { --neon-green: #0f0; --neon-red: #f00; }
        body { background: #000; color: #eee; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .lang-bar { display: flex; justify-content: flex-end; gap: 15px; padding: 10px; align-items: center; }
        .vol-toggle { background:none; border:2px solid var(--neon-green); color:var(--neon-green); border-radius:50%; width:45px; height:45px; cursor:pointer; margin-right: auto; font-size: 1.2rem; }
        .flag { font-size: 1.6rem; cursor: pointer; opacity: 0.4; }
        .flag.active { opacity: 1; border-bottom: 3px solid var(--neon-green); }
        .header { border: 1px solid var(--neon-green); padding: 12px; border-radius: 12px; margin-bottom: 15px; font-weight: bold; color: var(--neon-green); text-transform: uppercase; font-size: 0.85rem; }
        .scanner-unit { width: 170px; height: 170px; margin: 0 auto 15px; border: 3px solid var(--neon-green); border-radius: 50%; overflow: hidden; position: relative; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; width: 100%; height: 4px; background: var(--neon-red); top: 0; display: none; z-index: 10; box-shadow: 0 0 15px red; }
        @keyframes scanAnim { 0%, 100% { top: 15%; } 50% { top: 85%; } }
        .info-msg { font-size: 1rem; color: var(--neon-green); margin: 10px 0; min-height: 3rem; font-weight: bold; }
        .table-wrapper { display: none; max-height: 280px; overflow-y: auto; border: 1px solid #444; margin-top: 10px; border-radius: 8px; }
        table { width: 100%; font-size: 0.85rem; border-collapse: collapse; }
        th, td { padding: 12px 5px; border: 1px solid #222; text-align: center; }
        tr:nth-child(even) { background: rgba(255,255,255,0.05); }
        .crit { color: var(--neon-red); font-weight: bold; background: rgba(255,0,0,0.1); }
        .btn-main { width:100%; padding:20px; background:var(--neon-green); border:none; border-radius:40px; font-weight:bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 0 10px rgba(0,255,0,0.2); }
        .wa-area { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .wa-btn { padding: 15px 5px; border-radius: 35px; font-weight: bold; color: white; text-decoration: none; font-size: 0.8rem; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="lang-bar">
    <button id="vol-btn" class="vol-toggle" onclick="toggleMute()">🔇</button>
    <span class="flag active" id="f-ro" onclick="setL('ro')">🇷🇴</span>
    <span class="flag" id="f-en" onclick="setL('en')">🇺🇸</span>
</div>

<div class="header">AOH-FOD: LONGEVITATE & VITALITATE</div>

<div class="scanner-unit">
    <div id="laser-line" class="laser"></div>
    <video id="v" autoplay playsinline muted></video>
</div>

<div id="status-msg" class="info-msg">PUNEȚI DEGETUL PE CAMERĂ<br>ȘI APĂSAȚI START</div>

<button id="scan-btn" class="btn-main" onclick="startDeepScan()">🧬 START SCANARE (10s)</button>

<div id="t-wrap" class="table-wrapper">
    <table>
        <thead><tr><th>MARKER</th><th>OPTIM</th><th>REAL</th><th>STARE</th></tr></thead>
        <tbody id="res-body"></tbody>
    </table>
</div>

<div id="wa-menu" class="wa-area">
    <button class="wa-btn" style="background:#0088ff" onclick="doWA('shop')">🛒 CUMPĂRĂTURI</button>
    <button class="wa-btn" style="background:#25D366; color:black;" onclick="doWA('cook')">👨‍🍳 MENIU AI</button>
</div>

<script>
    let curL = 'ro', isMuted = true, lowMarkers = [];
    let audioCtx = null;

    const nutrients = [
        {ro:'💧 Hidratare', en:'💧 Hydration', opt:100, fRo:'500ml Apă', fEn:'500ml Water', mRo:'Apa', mEn:'Water', ai:'LIQUID|0m'},
        {ro:'🍌 Potasiu', en:'🍌 Potassium', opt:4700, fRo:'2 Banane', fEn:'2 Bananas', mRo:'Smoothie', mEn:'Smoothie', ai:'BLEND|2m'},
        {ro:'🎃 Magneziu', en:'Magnesium', opt:400, fRo:'50g Dovleac', fEn:'50g Pumpkin', mRo:'Supă Cremă', mEn:'Cream Soup', ai:'STEAM|15m'},
        {ro:'🥩 Fier', en:'Iron', opt:18, fRo:'150g Spanac', fEn:'150g Spinach', mRo:'Sote Spanac', mEn:'Spinach Saute', ai:'SAUTE|5m'}
    ];

    async function initCam() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('v').srcObject = stream;
        } catch (err) { alert("Permiteți accesul la cameră!"); }
    }
    initCam();

    function setupAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function toggleMute() {
        setupAudio();
        isMuted = !isMuted;
        document.getElementById('vol-btn').innerText = isMuted ? '🔇' : '🔊';
        if (!isMuted) speak(curL === 'ro' ? "Sistem activat" : "System active");
    }

    function playBeep(freq, dur) {
        if (isMuted || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function speak(txt) {
        if (isMuted) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = curL === 'ro' ? 'ro-RO' : 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function getRed() {
        const v = document.getElementById('v'), canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
        canvas.width = 10; canvas.height = 10;
        ctx.drawImage(v, 0, 0, 10, 10);
        const d = ctx.getImageData(0,0,10,10).data;
        let r = 0; for(let i=0; i<d.length; i+=4) r += d[i];
        return r/25; 
    }

    function startDeepScan() {
        setupAudio();
        // Trezire voce forțată pentru mobil la click
        const wakeup = new SpeechSynthesisUtterance(' ');
        window.speechSynthesis.speak(wakeup);

        if (isMuted) { alert(curL==='ro'?"Activați 🔊 mai întâi!":"Turn on 🔊 first!"); return; }
        
        let timeLeft = 10;
        const btn = document.getElementById('scan-btn'), laser = document.getElementById('laser-line'), status = document.getElementById('status-msg');
        btn.disabled = true;
        laser.style.display = 'block';
        laser.style.animation = 'scanAnim 1.5s infinite linear';

        const timer = setInterval(() => {
            const redValue = getRed();
            if (redValue < 100) {
                status.innerText = "⚠️ PUNEȚI DEGETUL PE CAMERĂ!";
                playBeep(200, 0.1);
                return;
            }

            if (timeLeft > 0) {
                playBeep(880, 0.1); // BIPUL DE SECUNDĂ
                status.innerText = (curL==='ro' ? "SCANARE: " : "SCANNING: ") + timeLeft + "s";
                timeLeft--;
            } else {
                clearInterval(timer);
                laser.style.display = 'none';
                btn.disabled = false;
                finish(redValue);
            }
        }, 1000);
    }

    function finish(red) {
        document.getElementById('t-wrap').style.display = 'block';
        document.getElementById('wa-menu').style.display = 'grid';
        const body = document.getElementById('res-body');
        body.innerHTML = ''; lowMarkers = [];

        nutrients.forEach(n => {
            const real = Math.floor((red/255) * n.opt * (0.6 + Math.random()*0.4));
            const isLow = real < (n.opt * 0.7);
            if (isLow) lowMarkers.push(n);
            body.innerHTML += `<tr class="${isLow?'crit':''}"><td>${curL==='ro'?n.ro:n.en}</td><td>${n.opt}</td><td>${real}</td><td>${isLow?'⚠️':'✅'}</td></tr>`;
        });

        speak(curL==='ro' ? "Scanare completă. Aveți deficite." : "Scan complete. Deficiencies found.");
    }

    function doWA(type) {
        let text = "";
        if (type === 'shop') {
            const items = lowMarkers.map(m => curL==='ro'?m.fRo:m.fEn).join(", ");
            text = `🛒 *SHOPPING AOH*\n\nDe luat: ${items || "Fructe"}`;
        } else {
            text = `👨‍🍳 *MENIU AI*\n\n`;
            lowMarkers.forEach(m => text += `🔹 *${curL==='ro'?m.mRo:m.mEn}*\n   🤖 CMD: \`${m.ai}\`\n\n`);
        }
        window.open(`https://wa.me{encodeURIComponent(text)}`, '_blank');
    }

    function setL(l) {
        curL = l;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        document.getElementById('f-'+l).classList.add('active');
    }
</script>
</body>
</html>
