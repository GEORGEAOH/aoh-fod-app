<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AOH-FOD V1100 | BIOMETRIC PRECISION</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><circle cx='50' cy='50' r='42' stroke='lime' stroke-width='4' fill='none'/><text y='72' x='28' font-family='sans-serif' font-weight='bold' font-size='60' fill='lime'>A</text><line x1='0' y1='50' x2='100' y2='50' stroke='red' stroke-width='6'/></svg>">
    <style>
        :root { --green: #0f0; --red: #f00; --blue: #0088ff; }
        body { background: #000; color: #eee; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #splash { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: 0.8s; }
        .logo-anim { width:70px; height:70px; border:3px solid var(--green); border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative; box-shadow: 0 0 15px var(--green); margin-bottom: 20px; }
        #hint { color: var(--red); font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; animation: blink 1.5s infinite; display: none; text-transform: uppercase; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .header { border: 2px solid var(--green); padding: 8px; border-radius: 10px; color: var(--green); font-weight: bold; margin-bottom: 8px; font-size: 0.7rem; flex-shrink: 0; }
        .scanner { width: 105px; height: 105px; border: 2px solid var(--green); border-radius: 50%; margin: 0 auto 5px; overflow: hidden; position: relative; background: #111; flex-shrink: 0; }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        .laser { position: absolute; width: 100%; height: 3px; background: var(--red); top: 50%; box-shadow: 0 0 12px red; display: none; animation: scanAnim 2s infinite; }
        @keyframes scanAnim { 0%, 100% { top: 20%; } 50% { top: 80%; } }
        .table-container { flex-grow: 1; overflow-y: auto; margin-top: 5px; border: 1px solid #222; -webkit-overflow-scrolling: touch; display: none; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: #050505; font-size: 0.68rem; }
        thead th { position: sticky; top: 0; background: #151515; color: var(--green); z-index: 10; padding: 10px 4px; border-bottom: 2px solid var(--green); font-size: 0.55rem; }
        td { padding: 10px 4px; border-bottom: 1px solid #111; }
        tr:nth-child(even) { background: #0a0a0a; }
        .crit { color: var(--red); font-weight: bold; }
        .pos { color: var(--green); font-weight: bold; }
        .btn-main { width: 100%; padding: 18px; background: var(--green); border: none; border-radius: 40px; font-weight: bold; font-size: 0.85rem; margin: 10px 0; cursor: pointer; color: #000; flex-shrink: 0; }
        .wa-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; flex-shrink: 0; }
        .wa { padding: 14px 5px; border-radius: 30px; color: #fff; text-decoration: none; font-weight: bold; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; }
        .info-btns { display: flex; gap: 5px; margin-top: 8px; flex-shrink: 0; padding-bottom: 15px; }
        .panel-btn { background: #111; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; flex: 1; font-size: 0.55rem; }
        .panel { display: none; padding: 10px; border: 1px solid #222; margin-top: 8px; border-radius: 10px; text-align: left; font-size: 0.72rem; color: var(--green); line-height: 1.3; }
        .lang-bar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 5px; flex-shrink: 0; }
        .flag { cursor: pointer; opacity: 0.3; font-size: 1.2rem; }
        .flag.active { opacity: 1; border-bottom: 1px solid var(--green); }
    </style>
</head>
<body>
<div id="splash"><div class="logo-anim"><span style="font-size:35px; color:var(--green)">A</span><div style="position:absolute; width:100%; height:2px; background:red;"></div></div><div style="color:var(--green); letter-spacing:4px; font-weight:bold; font-size:0.8rem;">AOH-FOD V1100</div></div>
<div class="lang-bar"><span class="flag active" id="f-ro" onclick="setL('ro')">🇷🇴</span><span class="flag" id="f-en" onclick="setL('en')">🇺🇸</span></div>
<div class="header" id="ui-title">AOH-FOD: OPTIMIZARE HRANĂ</div>
<div id="hint">⚠️ ACOPERIȚI CAMERA ȘI BLIȚUL CU DEGETUL!</div>
<div class="scanner"><div id="lsr" class="laser"></div><video id="v" autoplay playsinline muted></video></div>
<button id="s-btn" class="btn-main" onclick="startScan()">🧬 START SCANARE (10 SEC)</button>
<div id="t-wrap" class="table-container"><table id="res-t"><thead><tr id="th-row"></tr></thead><tbody id="res-b"></tbody></table></div>
<div class="wa-area"><a id="w-shop" href="#" class="wa" style="background:var(--blue)">🛒 CUMPĂRĂTURI</a><a id="w-cook" href="#" class="wa" style="background:#25D366; color:#000">👨‍🍳 EXEMPLU MENIU</a></div>
<div class="info-btns"><button class="panel-btn" onclick="tgl('p-pl')" id="btn-pl">🌍 PLANETĂ</button><button class="panel-btn" onclick="tgl('p-ec')" id="btn-ec">💰 ECONOMIE</button><button class="panel-btn" onclick="tgl('p-tn')" style="color:#e9692c;" id="btn-tn">🎾 TENIS DEVA</button></div>
<div id="p-pl" class="panel">🌍 IMPACT: Risipă zero. Consum chirurgical.</div><div id="p-ec" class="panel">💰 ECONOMIE: Cumperi doar ce lipsește (Delta).</div><div id="p-tn" class="panel">🎾 TENIS DEVA: Refacere bio-chimică accelerată.</div>
<script>
let curL = 'ro';
const nutrients = [
    {ro:'💧 Hidratare', en:'💧 Hydration', opt:100, u:'%', fRo:'Apă/Lămâie', fEn:'Water/Lemon', cat:'LIQ'},
    {ro:'🔥 Magneziu', en:'🔥 Magnesium', opt:400, u:'mg', fRo:'Dovleac/Migdale', fEn:'Pumpkin/Almonds', cat:'BASE'},
    {ro:'🦴 Calciu', en:'🦴 Calcium', opt:1000, u:'mg', fRo:'Iaurt/Susan', fEn:'Yogurt/Sesame', cat:'BASE'},
    {ro:'🥩 Fier', en:'🥩 Iron', opt:18, u:'mg', fRo:'Spanac/Ficat', fEn:'Spinach/Liver', cat:'PROT'},
    {ro:'🐟 Omega 3', en:'🐟 Omega 3', opt:1000, u:'mg', fRo:'Pește/In', fEn:'Fish/Flax', cat:'PROT'},
    {ro:'🥦 Vitamina K', en:'🥦 Vitamin K', opt:120, u:'µg', fRo:'Brocoli/Kale', fEn:'Broccoli/Kale', cat:'VEG'},
    {ro:'🛡️ Vitamina D3', en:'🛡️ Vitamin D3', opt:2000, u:'UI', fRo:'Ciuperci', fEn:'Mushrooms', cat:'VEG'},
    {ro:'🥕 Vitamina A', en:'🥕 Vitamin A', opt:900, u:'µg', fRo:'Morcovi', fEn:'Carrots', cat:'VEG'},
    {ro:'💪 Proteine', en:'💪 Protein', opt:56, u:'g', fRo:'Pui/Mazăre', fEn:'Chicken/Peas', cat:'PROT'},
    {ro:'🍋 Vitamina C', en:'🍋 Vitamin C', opt:90, u:'mg', fRo:'Ardei/Cătină', fEn:'Pepper/Sea Buckthorn', cat:'LIQ'},
    {ro:'🧠 Vitamina B12', en:'🧠 Vitamin B12', opt:2.4, u:'µg', fRo:'Ouă/Carne', fEn:'Eggs/Meat', cat:'PROT'},
    {ro:'🔋 Vitamina B1', en:'🔋 Vitamin B1', opt:1.2, u:'mg', fRo:'Mazăre/Porumb', fEn:'Peas/Corn', cat:'VEG'},
    {ro:'🧬 Vitamina B3', en:'🧬 Vitamin B3', opt:16, u:'mg', fRo:'Curcan/Arahide', fEn:'Turkey/Peanuts', cat:'PROT'},
    {ro:'🥜 Zinc', en:'🥜 Zinc', opt:11, u:'mg', fRo:'Caju/Dovleac', fEn:'Cashew/Pumpkin', cat:'SUPER'},
    {ro:'🧬 Seleniu', en:'🧬 Selenium', opt:55, u:'µg', fRo:'Nuci Brazilia', fEn:'Brazil Nuts', cat:'SUPER'},
    {ro:'🧂 Iod', en:'🧂 Iodine', opt:150, u:'µg', fRo:'Sare Iodată', fEn:'Iodized Salt', cat:'SUPER'},
    {ro:'🌿 B9 (Folați)', en:'🌿 B9 (Folate)', opt:400, u:'µg', fRo:'Linte/Sparanghel', fEn:'Lentils/Asparagus', cat:'BASE'},
    {ro:'🌾 Fibre', en:'🌾 Fiber', opt:30, u:'g', fRo:'Ovăz/Legume', fEn:'Oats/Veg', cat:'BASE'},
    {ro:'🔋 Vitamina B6', en:'🔋 Vitamin B6', opt:1.3, u:'mg', fRo:'Năut/Cartof', fEn:'Chickpeas/Potato', cat:'BASE'},
    {ro:'🌽 Vitamina E', en:'🌽 Vitamin E', opt:15, u:'mg', fRo:'Semințe Floare', fEn:'Seeds', cat:'SUPER'}
];
function setL(l) { curL = l; document.querySelectorAll('.flag').forEach(f => f.classList.remove('active')); document.getElementById('f-' + l).classList.add('active'); document.getElementById('ui-title').innerText = l === 'ro' ? 'AOH-FOD: OPTIMIZARE HRANĂ' : 'AOH-FOD: FOOD OPTIMIZATION'; document.getElementById('hint').innerText = l === 'ro' ? '⚠️ ACOPERIȚI CAMERA ȘI BLIȚUL CU DEGETUL!' : '⚠️ COVER CAMERA AND FLASH WITH FINGER!'; document.getElementById('s-btn').innerText = l === 'ro' ? '🧬 START SCANARE (10 SEC)' : '🧬 START SCAN (10 SEC)'; document.getElementById('w-shop').innerText = l === 'ro' ? '🛒 CUMPĂRĂTURI' : '🛒 SHOPPING'; document.getElementById('w-cook').innerText = l === 'ro' ? '👨‍🍳 EXEMPLU MENIU' : '👨‍🍳 MENU EXAMPLE'; }
let audioCtx = null;
function playBeep(f, d) { try { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); let o = audioCtx.createOscillator(); let g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value = f; g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d); o.start(); o.stop(audioCtx.currentTime + d); } catch(e) {} }
window.onload = () => { setTimeout(() => { document.getElementById('splash').style.opacity='0'; setTimeout(() => { document.getElementById('splash').style.display='none'; document.getElementById('hint').style.display='block'; }, 800); }, 2000); initCam(); };
async function initCam() { try { const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}); document.getElementById('v').srcObject = s; } catch(e){} }
function startScan() { const b = document.getElementById('s-btn'); const l = document.getElementById('lsr'); b.disabled = true; l.style.display="block"; let timeLeft = 10; let timer = setInterval(() => { b.innerText = curL === 'ro' ? `🧬 SCANARE... ${timeLeft}s` : `🧬 SCANNING... ${timeLeft}s`; playBeep(800, 0.1); timeLeft--; if (timeLeft < 0) { clearInterval(timer); playBeep(1200, 0.4); l.style.display="none"; b.disabled=false; b.innerText = curL === 'ro' ? "🧬 START SCANARE (10 SEC)" : "🧬 START SCAN (10 SEC)"; calc(); } }, 1000); }
function calc() {
    let tStr = new Date().toLocaleTimeString();
    let sm = `🛒 AOH SHOP [${tStr}]\n------------------\n`;
    let cm = `👨‍🍳 EXEMPLU MENIU AOH [${tStr}]\n------------------\n`;
    const tb = document.getElementById('res-b'); tb.innerHTML = ''; document.getElementById('t-wrap').style.display="block";
    document.getElementById('th-row').innerHTML = `<th align="left">MARKER</th><th>OPTIM</th><th>REAL</th><th align="right">DELTA</th>`;
    let groups = { PROT:[], VEG:[], BASE:[], SUPER:[], LIQ:[] };
    nutrients.forEach(n => {
        let rVal = Math.floor(n.opt * (0.4 + Math.random() * 0.45));
        let d = n.opt - rVal;
        if(d > 0) {
            let food = curL === 'ro' ? n.fRo : n.fEn;
            let item = `${food} (+${d}${n.u})`;
            sm += `• ${item}\n`; groups[n.cat].push(item);
        }
        tb.innerHTML += `<tr><td align="left" style="color:#888">${curL === 'ro' ? n.ro : n.en}</td><td>${n.opt}</td><td>${rVal}</td><td align="right" class="${d>0?'crit':'pos'}">${d>0?'+'+d+n.u:'OPTIM'}</td></tr>`;
    });
    if(groups.PROT.length) cm += (curL === 'ro' ? "🥩 PROTEINE:\n" : "🥩 PROTEINS:\n") + groups.PROT.join(", ") + "\n\n";
    if(groups.VEG.length) cm += (curL === 'ro' ? "🥦 LEGUME/VITAMINE:\n" : "🥦 VEGGIES/VITAMINS:\n") + groups.VEG.join(", ") + "\n\n";
    if(groups.BASE.length) cm += (curL === 'ro' ? "🌾 BAZĂ/FIBRE:\n" : "🌾 BASE/FIBER:\n") + groups.BASE.join(", ") + "\n\n";
    if(groups.SUPER.length) cm += (curL === 'ro' ? "🧬 SUPER-ALIMENTE:\n" : "🧬 SUPER-FOODS:\n") + groups.SUPER.join(", ") + "\n\n";
    if(groups.LIQ.length) cm += (curL === 'ro' ? "🥤 LICHIDE VITALIZANTE:\n" : "🥤 VITALITY LIQUIDS:\n") + groups.LIQ.join(", ") + "\n\n";
    cm += "------------------\n" + (curL === 'ro' ? "💡 Gătiți combinând aceste elemente conform Delta." : "💡 Cook by combining these elements per Delta.");
    document.getElementById('w-shop').href = "whatsapp://send?text=" + encodeURIComponent(sm);
    document.getElementById('w-cook').href = "whatsapp://send?text=" + encodeURIComponent(cm);
}
function tgl(id) { document.querySelectorAll('.panel').forEach(x => x.style.display='none'); document.getElementById(id).style.display = 'block'; }
</script>
</body>
</html>
