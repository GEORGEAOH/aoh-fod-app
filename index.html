<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AOH-FOD V830 | Smart Biometrics</title>
    <style>
        :root { --neon-green: #0f0; --neon-red: #f00; --blue: #0088ff; --dark-gray: #1a1a1a; }
        body { background: #000; color: #eee; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 10px; text-align: center; overflow-x: hidden; padding-bottom: 60px; }
        
        /* Header & Lang Bar */
        .lang-bar { display: flex; justify-content: flex-end; gap: 15px; padding: 10px; align-items: center; }
        .vol-toggle { background:none; border:2px solid var(--neon-green); color:var(--neon-green); border-radius:50%; width:45px; height:45px; cursor:pointer; margin-right: auto; font-size: 1.2rem; transition: 0.3s; }
        .vol-active { box-shadow: 0 0 15px var(--neon-green); background: rgba(0,255,0,0.1); }
        .flag { font-size: 1.6rem; cursor: pointer; opacity: 0.4; transition: 0.3s; padding-bottom: 2px; }
        .flag.active { opacity: 1; border-bottom: 3px solid var(--neon-green); transform: scale(1.1); }
        
        .header { border: 1px solid var(--neon-green); padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 0.9rem; font-weight: bold; color: var(--neon-green); text-transform: uppercase; letter-spacing: 1px; }

        /* Scanner */
        .scanner-unit { width: 180px; height: 180px; margin: 0 auto 15px; border: 3px solid var(--neon-green); border-radius: 50%; overflow: hidden; position: relative; box-shadow: 0 0 20px rgba(0,255,0,0.3); }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .laser { position: absolute; width: 100%; height: 4px; background: var(--neon-red); top: 0; display: none; z-index: 10; box-shadow: 0 0 15px red; }
        @keyframes scanAnim { 0%, 100% { top: 15%; } 50% { top: 85%; } }

        .info-msg { font-size: 1rem; color: var(--neon-green); margin: 10px 0; min-height: 3rem; font-weight: bold; display: flex; align-items: center; justify-content: center; padding: 0 10px; }

        /* Table Design - Modern & Readable */
        .table-wrapper { display: none; max-height: 320px; overflow-y: auto; border: 1px solid #444; border-radius: 8px; margin-top: 10px; background: #080808; }
        table { width: 100%; font-size: 0.9rem; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #111; color: var(--neon-green); padding: 12px 5px; border-bottom: 2px solid var(--neon-green); z-index: 5; text-transform: uppercase; font-size: 0.75rem; }
        td { padding: 14px 5px; border-bottom: 1px solid #222; text-align: center; }
        
        /* Zebra Striping for readability */
        tr:nth-child(even) { background: rgba(255, 255, 255, 0.03); }
        
        /* Critical Markers Styling */
        .crit { color: var(--neon-red); font-weight: bold; background: rgba(255,0,0,0.08) !important; animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { background: rgba(255,0,0,0.08); } 50% { background: rgba(255,0,0,0.15); } 100% { background: rgba(255,0,0,0.08); } }

        /* Buttons */
        .btn-main { width:100%; padding:22px; background:var(--neon-green); border:none; border-radius:40px; font-weight:bold; color:black; cursor:pointer; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0,255,0,0.2); transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); box-shadow: none; }
        
        .wa-area { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .wa-btn { padding: 18px 5px; border-radius: 40px; font-weight: bold; font-size: 0.85rem; color: white; border: none; cursor: pointer; text-decoration: none; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .bg-shop { background: var(--blue); }
        .bg-cook { background: #25D366; color: black; }
    </style>
</head>
<body>

<div class="lang-bar">
    <button id="vol-btn" class="vol-toggle" onclick="toggleMute()">🔇</button>
    <span class="flag active" id="f-ro" onclick="setL('ro')">🇷🇴</span>
    <span class="flag" id="f-en" onclick="setL('en')">🇺🇸</span>
</div>

<div class="header" id="ui-title">AOH-FOD: LONGEVITATE & VITALITATE</div>

<div class="scanner-unit">
    <div class="laser" id="laser-line"></div>
    <video id="v" autoplay playsinline muted></video>
</div>

<div class="info-msg" id="status-msg">ACTIVAȚI VOLUMUL ȘI PUNEȚI DEGETUL PE CAMERĂ</div>

<button id="scan-btn" class="btn-main" onclick="startDeepScan()">🧬 START SCANARE (10 SEC)</button>

<div class="table-wrapper" id="t-wrap">
    <table>
        <thead><tr><th id="h-m">MARKER</th><th id="h-o">OPTIM</th><th id="h-r">REAL</th><th id="h-s">STARE</th></tr></thead>
        <tbody id="res-body"></tbody>
    </table>
</div>

<div id="wa-menu" class="wa-area">
    <a id="wa-s-btn" class="wa-btn bg-shop" onclick="doWA('shop')">🛒 CUMPĂRĂTURI</a>
    <a id="wa-c-btn" class="wa-btn bg-cook" onclick="doWA('cook')">👨‍🍳 MENIU AI</a>
</div>

<script>
    let curL = 'ro', isMuted = true, lowMarkers = [];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    const nutrients = [
        {ro:'💧 Hidratare', en:'💧 Hydration', opt:100, fRo:'500ml Apă', fEn:'500ml Water', mRo:'Hidratare Celulară', mEn:'Cellular Hydration', ai:'LIQUID_BOOST|0m'},
        {ro:'🍌 Potasiu', en:'🍌 Potassium', opt:4700, fRo:'2 Banane', fEn:'2 Bananas', mRo:'Smoothie Energetic', mEn:'Energy Smoothie', ai:'BLEND|2m'},
        {ro:'🎃 Magneziu', en:'Magnesium', opt:400, fRo:'50g Dovleac', fEn:'50g Pumpkin', mRo:'Supă Cremă Magneziu', mEn:'Magnesium Cream Soup', ai:'STEAM_BLITZ|15m'},
        {ro:'🥩 Fier', en:'Iron', opt:18, fRo:'150g Spanac', fEn:'150g Spinach', mRo:'Sote de Fier', mEn:'Iron Saute', ai:'SAUTE|5m'},
        {ro:'🥦 Vitamina K', en:'Vitamin K', opt:120, fRo:'Brocoli', fEn:'Broccoli', mRo:'Broccoli la Abur', mEn:'Steamed Broccoli', ai:'STEAM_SOFT|8m'},
        {ro:'🐟 Omega 3', en:'Omega 3', opt:1000, fRo:'Pește', fEn:'Fish', mRo:'File Omega-3 AI', mEn:'Omega-3 File AI', ai:'AIR_FRY|12m'}
    ];

    async function initCam() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
            document.getElementById('v').srcObject = s;
        } catch(e) { console.error("Camera error"); }
    }
    initCam();

    function toggleMute() {
        isMuted = !isMuted;
        const btn = document.getElementById('vol-btn');
        btn.innerText = isMuted ? '🔇' : '🔊';
        btn.classList.toggle('vol-active', !isMuted);
        if (!isMuted) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            speak(curL === 'ro' ? "Sistem vocal activat. Gata pentru scanare." : "Voice system active. Ready for scan.");
        }
    }

    function speak(txt) {
        if (isMuted) return;
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(txt);
        m.lang = curL === 'ro' ? 'ro-RO' : 'en-US';
        m.rate = 0.95;
        window.speechSynthesis.speak(m);
    }

    // Comenzi Vocale Simple
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = SpeechRecognition ? new SpeechRecognition() : null;
    if (recognition) {
        recognition.lang = 'ro-RO';
        recognition.onresult = (e) => {
            const cmd = e.results.transcript.toLowerCase();
            if (cmd.includes("start")) startDeepScan();
            if (cmd.includes("cumpărături")) doWA('shop');
        };
    }
    function listen() { if(!isMuted && recognition) recognition.start(); }

    function getSensorData() {
        const v = document.getElementById('v'), canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
        canvas.width = 10; canvas.height = 10;
        ctx.drawImage(v, 0, 0, 10, 10);
        const p = ctx.getImageData(0, 0, 10, 10).data;
        let r = 0; for (let i = 0; i < p.length; i += 4) r += p[i];
        return r / (p.length / 4);
    }

    function startDeepScan() {
        if (isMuted) { speak("Vă rugăm activați sunetul întâi."); return; }
        let timeLeft = 10, btn = document.getElementById('scan-btn'), laser = document.getElementById('laser-line');
        btn.disabled = true;
        laser.style.display = 'block';
        laser.style.animation = 'scanAnim 1.5s infinite linear';

        let timer = setInterval(() => {
            const redValue = getSensorData();
            if (redValue < 130) {
                document.getElementById('status-msg').innerText = "⚠️ REPOZIȚIONAȚI DEGETUL!";
                return;
            }
            if (timeLeft > 0) {
                document.getElementById('status-msg').innerText = (curL==='ro'?'ANALIZĂ BIOMETRICĂ: ':'BIOMETRIC ANALYSIS: ') + timeLeft + 's';
                timeLeft--;
            } else {
                clearInterval(timer);
                finishScan(redValue);
            }
        }, 1000);
    }

    function finishScan(val) {
        document.getElementById('laser-line').style.display = 'none';
        document.getElementById('t-wrap').style.display = 'block';
        document.getElementById('wa-menu').style.display = 'grid';
        const body = document.getElementById('res-body');
        body.innerHTML = '';
        lowMarkers = [];

        nutrients.forEach(n => {
            const real = Math.floor((val / 255) * n.opt * (0.6 + Math.random() * 0.5));
            const isLow = real < (n.opt * 0.7);
            if (isLow) lowMarkers.push(n);

            const row = document.createElement('tr');
            if(isLow) row.className = 'crit';
            row.innerHTML = `<td>${curL==='ro'?n.ro:n.en}</td><td>${n.opt}</td><td>${real}</td><td>${isLow?'⚠️ LOW':'✅ OK'}</td>`;
            body.appendChild(row);
        });

        const msg = curL==='ro' ? "Scanare reușită. Deficiențe identificate." : "Scan successful. Deficiencies found.";
        document.getElementById('status-msg').innerText = msg;
        speak(msg);
        document.getElementById('scan-btn').disabled = false;
        setTimeout(listen, 3000);
    }

    function doWA(type) {
        let text = "";
        const h = new Date().getHours(), period = (h < 11) ? "Mic Dejun" : (h < 18) ? "Prânz" : "Cină";
        if (type === 'shop') {
            const list = lowMarkers.map(m => curL==='ro'?m.fRo:m.fEn).join(", ");
            text = `🛒 *CUMPĂRĂTURI AOH-V830*\n\nNecesare pentru corp: ${list || "Fructe/Legume"}`;
        } else {
            text = `👨‍🍳 *MENIU PERSONALIZAT (${period})*\n\n`;
            lowMarkers.forEach(m => text += `🔹 *${curL==='ro'?m.mRo:m.mEn}*\n   🤖 COMANDĂ AI: \`${m.ai}\`\n\n`);
        }
        window.open(`https://wa.me{encodeURIComponent(text)}`, '_blank');
    }

    function setL(l) {
        curL = l;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        document.getElementById('f-'+l).classList.add('active');
        document.getElementById('ui-title').innerText = l==='ro'?'AOH-FOD: LONGEVITATE & VITALITATE':'AOH-FOD: LONGEVITY & VITALITY';
        document.getElementById('scan-btn').innerText = l==='ro'?'🧬 START SCANARE (10 SEC)':'🧬 START SCAN (10 SEC)';
        document.getElementById('h-m').innerText = l==='ro'?'MARKER':'MARKER';
        document.getElementById('h-s').innerText = l==='ro'?'STARE':'STATUS';
    }
</script>
</body>
</html>
