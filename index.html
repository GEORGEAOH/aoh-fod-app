<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AOH-FOD V1100</title>
    <style>
        :root { --green: #0f0; --red: #f00; --blue: #0088ff; }
        body { background: #000; color: #eee; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { border: 2px solid var(--green); padding: 8px; border-radius: 10px; color: var(--green); font-weight: bold; margin-bottom: 8px; font-size: 0.7rem; flex-shrink: 0; }
        .scanner { width: 105px; height: 105px; border: 2px solid var(--green); border-radius: 50%; margin: 0 auto 5px; overflow: hidden; position: relative; background: #111; flex-shrink: 0; }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 1; }
        .laser { position: absolute; width: 100%; height: 3px; background: var(--red); top: 50%; box-shadow: 0 0 12px red; display: none; animation: scanAnim 2s infinite; }
        @keyframes scanAnim { 0%, 100% { top: 20%; } 50% { top: 80%; } }
        .table-container { flex-grow: 1; overflow-y: auto; margin-top: 5px; border: 1px solid #222; -webkit-overflow-scrolling: touch; display: none; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: #050505; font-size: 0.68rem; }
        thead th { position: sticky; top: 0; background: #151515; color: var(--green); z-index: 10; padding: 10px 4px; border-bottom: 2px solid var(--green); }
        td { padding: 10px 4px; border-bottom: 1px solid #111; }
        .btn-main { width: 100%; padding: 18px; background: var(--green); border: none; border-radius: 40px; font-weight: bold; font-size: 0.85rem; margin: 10px 0; cursor: pointer; color: #000; flex-shrink: 0; }
        .wa-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; flex-shrink: 0; }
        .wa { padding: 14px 5px; border-radius: 30px; color: #fff; text-decoration: none; font-weight: bold; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; }
        .info-btns { display: flex; gap: 5px; margin-top: 8px; flex-shrink: 0; padding-bottom: 15px; }
        .panel-btn { background: #111; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; flex: 1; font-size: 0.55rem; }
        .panel { display: none; padding: 10px; border: 1px solid #222; margin-top: 8px; border-radius: 10px; text-align: left; font-size: 0.72rem; color: var(--green); line-height: 1.3; }
    </style>
</head>
<body>
<div class="header">AOH-FOD: OPTIMIZARE HRANĂ</div>
<div class="scanner"><div id="lsr" class="laser"></div><video id="v" autoplay playsinline muted></video></div>
<button id="s-btn" class="btn-main" onclick="startScan()">🧬 START SCANARE (10 SEC)</button>
<div id="t-wrap" class="table-container"><table><thead><tr><th>NUTRIENT</th><th>OPTIM</th><th>SCANAT</th><th>NECESAR</th></tr></thead><tbody id="res-b"></tbody></table></div>

<div class="wa-area">
    <!-- Am revenit la tag-ul <a> cu href gol, exact ca în codul tău funcțional -->
    <a id="w-shop" href="javascript:void(0)" onclick="alert('Scanează mai întâi!')" class="wa" style="background:var(--blue)">🛒 CUMPĂRĂTURI</a>
    <a id="w-cook" href="javascript:void(0)" onclick="alert('Scanează mai întâi!')" class="wa" style="background:#25D366; color:#000">👨‍🍳 EXEMPLU MENIU</a>
</div>

<div class="info-btns">
    <button class="panel-btn" onclick="tgl('p-pl')">🌍 PLANETĂ</button>
    <button class="panel-btn" onclick="tgl('p-ec')">💰 ECONOMIE</button>
    <button class="panel-btn" onclick="tgl('p-tn')" style="color:#e9692c;">🎾 TENIS DEVA</button>
</div>
<div id="p-pl" class="panel">🌍 IMPACT: Risipă zero. Consum chirurgical.</div>
<div id="p-ec" class="panel">💰 ECONOMIE: Cumperi doar ce lipsește.</div>
<div id="p-tn" class="panel">🎾 TENIS DEVA: Refacere bio-chimică accelerată.</div>

<script>
let bioValue = 150;
const nutrients = [
    {ro:'🍌 Potasiu', opt:3500, u:'mg', f:'Banane/Cartofi'},
    {ro:'💧 Hidratare', opt:100, u:'%', f:'Apă/Lămâie'},
    {ro:'🔥 Magneziu', opt:400, u:'mg', f:'Dovleac/Migdale'},
    {ro:'🦴 Calciu', opt:1000, u:'mg', f:'Iaurt/Susan'},
    {ro:'🥩 Fier', opt:18, u:'mg', f:'Spanac/Ficat'},
    {ro:'🐟 Omega 3', opt:1000, u:'mg', f:'Pește/In'},
    {ro:'🥦 Vitamina K', opt:120, u:'µg', f:'Brocoli/Kale'},
    {ro:'🛡️ Vitamina D3', opt:2000, u:'UI', f:'Ciuperci'},
    {ro:'🥕 Vitamina A', opt:900, u:'µg', f:'Morcovi'},
    {ro:'💪 Proteine', opt:56, u:'g', f:'Pui/Mazăre'},
    {ro:'🍋 Vitamina C', opt:90, u:'mg', f:'Ardei/Cătină'},
    {ro:'🧠 Vitamina B12', opt:2.4, u:'µg', f:'Ouă/Carne'},
    {ro:'🔋 Vitamina B1', opt:1.2, u:'mg', f:'Mazăre/Porumb'},
    {ro:'🧬 Vitamina B3', opt:16, u:'mg', f:'Curcan/Arahide'},
    {ro:'🥜 Zinc', opt:11, u:'mg', f:'Caju/Dovleac'},
    {ro:'🧬 Seleniu', opt:55, u:'µg', f:'Nuci Brazilia'},
    {ro:'🧂 Iod', opt:150, u:'µg', f:'Sare Iodată'},
    {ro:'🌿 B9 (Folați)', opt:400, u:'µg', f:'Linte/Sparanghel'},
    {ro:'🌾 Fibre', opt:30, u:'g', f:'Ovăz/Legume'},
    {ro:'🔋 Vitamina B6', opt:1.3, u:'mg', f:'Năut/Cartof'},
    {ro:'🌽 Vitamina E', opt:15, u:'mg', f:'Semințe/Ulei'}
];

function tgl(id){
    document.querySelectorAll('.panel').forEach(p => p.style.display='none');
    document.getElementById(id).style.display='block';
}

async function startScan() {
    const v = document.getElementById('v');
    const b = document.getElementById('s-btn');
    try {
        const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
        v.srcObject = s;
        document.getElementById('lsr').style.display='block';
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const aiEye = setInterval(() => {
            ctx.drawImage(v, 0, 0, 10, 10);
            const d = ctx.getImageData(0,0,10,10).data;
            let r = 0; for(let i=0; i<d.length; i+=4) r += d[i];
            bioValue = r/(d.length/4);
        }, 100);

        let sec = 10;
        const t = setInterval(() => {
            b.innerText = "⏳ ANALIZĂ BIOMETRICĂ: " + sec + "s";
            sec--;
            if(sec < 0) {
                clearInterval(t); clearInterval(aiEye);
                s.getTracks().forEach(tr => tr.stop());
                document.getElementById('lsr').style.display='none';
                b.innerText = "✅ SCANARE FINALIZATĂ";
                showResults();
            }
        }, 1000);
    } catch(e) { alert("Eroare cameră!"); }
}

function showResults() {
    const resB = document.getElementById('res-b');
    resB.innerHTML = "";
    let list = "Necesarul meu AOH-FOD:\n";
    
    for(let i=0; i<nutrients.length; i++) {
        let n = nutrients[i];
        let scan = (n.opt * (0.4 + (bioValue/510) + Math.random()*0.1)).toFixed(1);
        let delta = (n.opt - scan).toFixed(1);
        if(delta < 0) delta = 0;
        
        resB.innerHTML += "<tr><td style='text-align:left'>"+n.ro+"</td><td>"+n.opt+n.u+"</td><td style='color:#0f0'>"+scan+"</td><td style='color:#f00; font-weight:bold;'>"+delta+n.u+"</td></tr>";
        if(delta > 0) list += "• " + n.ro + ": +" + delta + n.u + " (" + n.f + ")\n";
    }
    
    document.getElementById('t-wrap').style.display = "block";
    
    // ACEASTA ESTE LOGICA TA ORIGINALĂ CARE FUNCȚIONEAZĂ:
    const waLink = "https://wa.me" + encodeURIComponent(list);
    const shopBtn = document.getElementById('w-shop');
    const cookBtn = document.getElementById('w-cook');
    
    shopBtn.href = waLink;
    shopBtn.removeAttribute('onclick'); // Eliminăm alerta de "scanează mai întâi"
    
    cookBtn.href = waLink;
    cookBtn.removeAttribute('onclick');
}
</script>
</body>
</html>
