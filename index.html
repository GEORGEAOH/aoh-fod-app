<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AOH-FOD V1100 | BIOMETRIC PRECISION</title>
    <style>
        :root { --green: #0f0; --red: #f00; --blue: #0088ff; --orange: #ff8800; }
        body { background: #000; color: #eee; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Optimizare Tabel pentru lizibilitate */
        table { width: 100%; border-collapse: collapse; background: #050505; font-size: 0.85rem; } /* Font mărit */
        thead th { position: sticky; top: 0; background: #151515; color: var(--green); padding: 12px 4px; border-bottom: 2px solid var(--green); font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 12px 6px; border-bottom: 1px solid #222; }
        
        /* Evidențiere coloana Delta (Necesar) */
        .delta-cell { color: var(--orange); font-weight: bold; font-size: 0.9rem; background: rgba(255,136,0,0.1); }
        
        /* Scanner & Animatii */
        .scanner { width: 120px; height: 120px; border: 3px solid var(--green); border-radius: 50%; margin: 10px auto; overflow: hidden; position: relative; background: #111; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .laser { position: absolute; width: 100%; height: 4px; background: var(--red); top: 50%; box-shadow: 0 0 15px red; display: none; animation: scanAnim 2s infinite; z-index: 5; }
        @keyframes scanAnim { 0%, 100% { top: 10%; } 50% { top: 90%; } }
        
        #hint { color: var(--red); font-size: 0.8rem; font-weight: bold; margin: 5px 0; animation: blink 1.5s infinite; display: block; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .btn-main { width: 100%; padding: 20px; background: var(--green); border: none; border-radius: 40px; font-weight: bold; font-size: 1rem; margin: 10px 0; cursor: pointer; color: #000; transition: 0.3s; }
        .table-container { flex-grow: 1; overflow-y: auto; margin-top: 10px; border: 1px solid #333; border-radius: 10px; display: none; }
        
        .wa-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .wa { padding: 15px; border-radius: 30px; color: #fff; text-decoration: none; font-weight: bold; font-size: 0.75rem; text-align: center; }
    </style>
</head>
<body>

<div class="header">AOH-FOD: APARAT OPTIMIZARE HRANĂ</div>
<div id="hint">⚠️ ACOPERĂ CAMERA ȘI BLIȚUL COMPLET!</div>

<div class="scanner">
    <div id="lsr" class="laser"></div>
    <video id="v" autoplay playsinline muted></video>
</div>

<button id="s-btn" class="btn-main" onclick="startScan()">🧬 START SCANARE BIOMETRICĂ</button>

<div id="t-wrap" class="table-container">
    <table id="res-t">
        <thead>
            <tr>
                <th>Nutrient</th>
                <th>Optim</th>
                <th>Scânat</th>
                <th>NECESAR (Δ)</th>
            </tr>
        </thead>
        <tbody id="res-b"></tbody>
    </table>
</div>

<div class="wa-area">
    <a id="w-shop" href="#" class="wa" style="background:var(--blue)">🛒 LISTĂ CUMPĂRĂTURI</a>
    <a id="w-cook" href="#" class="wa" style="background:#25D366; color:#000">👨‍🍳 REȚETĂ OPTIMĂ</a>
</div>

<script>
// Am adăugat Potasiul și am reglat valorile de referință
const nutrients = [
    {ro:'🍌 Potasiu', opt:3500, u:'mg', f:'Banane/Cartofi'},
    {ro:'🔥 Magneziu', opt:400, u:'mg', f:'Dovleac/Migdale'},
    {ro:'💧 Hidratare', opt:100, u:'%', f:'Apă cu lămâie'},
    {ro:'🦴 Calciu', opt:1000, u:'mg', f:'Iaurt/Susan'},
    {ro:'🥩 Fier', opt:18, u:'mg', f:'Spanac/Ficat'},
    {ro:'🥦 Vitamina K', opt:120, u:'µg', f:'Brocoli/Kale'},
    {ro:'💪 Proteine', opt:56, u:'g', f:'Pui/Mazăre'},
    {ro:'🍋 Vitamina C', opt:90, u:'mg', f:'Ardei/Cătină'}
];

async function startScan() {
    const btn = document.getElementById('s-btn');
    const lsr = document.getElementById('lsr');
    const video = document.getElementById('v');
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        video.srcObject = stream;
        lsr.style.display = 'block';
        
        let sec = 10;
        const timer = setInterval(() => {
            btn.innerText = `⏳ SCANARE ÎN CURS: ${sec}s`;
            sec--;
            if(sec < 0) {
                clearInterval(timer);
                stopScan(stream);
            }
        }, 1000);
    } catch (e) { alert("Acces cameră refuzat!"); }
}

function stopScan(stream) {
    stream.getTracks().forEach(t => t.stop());
    document.getElementById('lsr').style.display = 'none';
    document.getElementById('s-btn').innerText = "✅ SCANARE COMPLETĂ";
    renderTable();
}

function renderTable() {
    const tbody = document.getElementById('res-b');
    tbody.innerHTML = '';
    let waMsg = "Necesarul meu AOH-FOD:\n";

    nutrients.forEach(n => {
        // Simulare AI: Corelarea datelor scanate (aici poți insera algoritmul tău real)
        let scanat = (n.opt * (0.6 + Math.random() * 0.3)).toFixed(1); 
        let delta = (n.opt - scanat).toFixed(1);
        if(delta < 0) delta = 0;

        const row = `<tr>
            <td>${n.ro}</td>
            <td>${n.opt}${n.u}</td>
            <td style="color:#0f0">${scanat}</td>
            <td class="delta-cell">${delta}${n.u}</td>
        </tr>`;
        tbody.appendChild(createRow(row));
        if(delta > 0) waMsg += `- ${n.ro}: +${delta}${n.u} (${n.f})\n`;
    });

    document.getElementById('t-wrap').style.display = 'block';
    document.getElementById('w-shop').href = "https://wa.me" + encodeURIComponent(waMsg);
}

function createRow(html) {
    const tr = document.createElement('tr');
    tr.innerHTML = html;
    return tr;
}
</script>
</body>
</html>
