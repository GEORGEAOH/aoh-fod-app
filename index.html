<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AOH-FOD V950 | WHATSAPP OK</title>
    <style>
        :root { --neon-green: #0f0; --neon-red: #f00; --blue: #0088ff; }
        body { background: #000; color: #eee; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; overflow-x: hidden; padding-bottom: 80px; }
        .lang-bar { display: flex; justify-content: flex-end; gap: 15px; padding: 10px; align-items: center; }
        .vol-toggle { background:none; border:1px solid var(--neon-green); color:var(--neon-green); border-radius:50%; width:40px; height:40px; cursor:pointer; margin-right: auto; }
        .flag { font-size: 1.5rem; cursor: pointer; opacity: 0.4; }
        .flag.active { opacity: 1; border-bottom: 2px solid var(--neon-green); }
        .header { border: 2px solid var(--neon-green); padding: 10px; border-radius: 10px; margin-bottom: 12px; font-weight: bold; color: var(--neon-green); text-transform: uppercase; font-size: 0.8rem; }
        .scanner-unit { width: 150px; height: 150px; margin: 0 auto 10px; border: 2px solid var(--neon-green); border-radius: 50%; overflow: hidden; position: relative; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .laser { position: absolute; width: 100%; height: 4px; background: var(--neon-red); top: 0; display: none; z-index: 10; box-shadow: 0 0 10px red; }
        @keyframes scanAnim { 0%, 100% { top: 15%; } 50% { top: 85%; } }
        .info-msg { font-size: 0.9rem; color: var(--neon-green); margin: 8px 0; min-height: 2.5rem; font-weight: bold; }
        .table-wrapper { display: none; max-height: 250px; overflow-y: auto; border: 1px solid #444; border-radius: 8px; margin-top: 10px; }
        table { width: 100%; font-size: 0.75rem; border-collapse: collapse; background: #050505; }
        th { position: sticky; top: 0; background: #111; color: var(--neon-green); padding: 10px 2px; border-bottom: 1px solid var(--neon-green); }
        td { padding: 10px 2px; border-bottom: 1px solid #222; text-align: center; }
        .crit { color: var(--neon-red); font-weight: bold; background: rgba(255,0,0,0.1); }
        .d-neg { color: var(--neon-red); font-weight: bold; }
        .d-pos { color: var(--neon-green); font-weight: bold; }
        .wa-area { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .wa-btn { padding: 15px 5px; border-radius: 30px; font-weight: bold; color: white; text-decoration: none; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; }
        .btn-main { width:100%; padding:20px; background:var(--neon-green); border:none; border-radius:35px; font-weight:bold; font-size: 1rem; cursor: pointer; color: black; }
        .extra-line { display: flex; gap: 5px; margin-top: 15px; }
        .btn-small { flex:1; background: #111; border: 1px solid #333; color: #fff; font-size: 0.6rem; padding: 10px 2px; border-radius: 8px; text-transform: uppercase; cursor: pointer; }
        .panel { display: none; background: #0a0a0a; border: 1px solid #222; padding: 10px; margin-top: 5px; text-align: left; font-size: 0.75rem; color: var(--neon-green); }
    </style>
</head>
<body onclick="setupAudio()">

<div class="lang-bar">
    <button id="v-btn" class="vol-toggle" onclick="toggleMute()">🔇</button>
    <span class="flag active" id="f-ro" onclick="setL('ro')">🇷🇴</span>
    <span class="flag" id="f-en" onclick="setL('en')">🇺🇸</span>
</div>

<div class="header" id="ui-title">AOH-FOD V950: VITALITATE MAXIMĂ</div>

<div class="scanner-unit">
    <div id="laser-line" class="laser"></div>
    <video id="v" autoplay playsinline muted></video>
</div>

<div id="status-msg" class="info-msg">APĂSAȚI DIFUZORUL (🔇), APOI START</div>

<button id="scan-btn" class="btn-main" onclick="startDeepScan()">🧬 START SCANARE (10 SEC)</button>

<div id="t-wrap" class="table-wrapper">
    <table>
        <thead><tr><th>MARKER</th><th>OPTIM</th><th>REAL</th><th>DELTA</th><th>STARE</th></tr></thead>
        <tbody id="res-body"></tbody>
    </table>
</div>

<!-- BUTOANELE ORIGINALE REPARATE -->
<div id="wa-menu" class="wa-area">
    <a id="btn-wa-shop" href="#" class="wa-btn" style="background:#0088ff" target="_blank">🛒 CUMPĂRĂTURI</a>
    <a id="btn-wa-cook" href="#" class="wa-btn" style="background:#25D366; color:black;" target="_blank">👨‍🍳 MENIU AI</a>
</div>

<div class="extra-line">
    <button class="btn-small" onclick="toggleP('planet')">🌍 PLANETĂ</button>
    <button class="btn-small" onclick="toggleP('wallet')">💰 ECONOMIE</button>
    <button class="btn-small" style="color:#e9692c; border-color:#e9692c;" onclick="toggleP('tenis')">🎾 TENIS DEVA</button>
</div>

<div id="p-planet" class="panel">💧 Apă salvată: 75L | 🌿 CO2 evitat: 1.8kg.</div>
<div id="p-wallet" class="panel">💰 Economie lunară: 450 RON.</div>
<div id="p-tenis" class="panel">🎾 TENIS DEVA: Recuperare metabolică rapidă.</div>

<script>
    let curL = 'ro', isMuted = true, lowMarkers = [], audioCtx = null;

    const nutrients = [
        {ro:'💧 Hidratare', en:'💧 Hydration', opt:100, fRo:'Apa', fEn:'Water', mRo:'Apa', mEn:'Water', ai:'LIQUID|0m'},
        {ro:'🍌 Potasiu', en:'🍌 Potassium', opt:4700, fRo:'Banane', fEn:'Bananas', mRo:'Smoothie', mEn:'Smoothie', ai:'BLEND|2m'},
        {ro:'🎃 Magneziu', en:'Magnesium', opt:400, fRo:'Dovleac', fEn:'Pumpkin', mRo:'Supa', mEn:'Soup', ai:'STEAM|15m'},
        {ro:'🦴 Calciu', en:'Calcium', opt:1000, fRo:'Iaurt', fEn:'Yogurt', mRo:'Iaurt', mEn:'Yogurt', ai:'MIX|0m'},
        {ro:'🥩 Fier', en:'Iron', opt:18, fRo:'Spanac', fEn:'Spinach', mRo:'Sote', mEn:'Saute', ai:'SAUTE|5m'},
        {ro:'🥦 Vitamina K', en:'Vitamin K', opt:120, fRo:'Brocoli', fEn:'Broccoli', mRo:'Abur', mEn:'Steam', ai:'STEAM|8m'},
        {ro:'🍋 Vitamina C', en:'Vitamin C', opt:90, fRo:'Lamaie', fEn:'Lemon', mRo:'Lamaie', mEn:'Lemon', ai:'EXTRACT|1m'},
        {ro:'💊 Vitamina D3', en:'Vitamin D3', opt:2000, fRo:'D3', fEn:'D3', mRo:'D3', mEn:'D3', ai:'SUPP|0m'},
        {ro:'🥜 Zinc', en:'Zinc', opt:11, fRo:'Caju', fEn:'Cashews', mRo:'Caju', mEn:'Cashews', ai:'RAW|0m'},
        {ro:'🐟 Omega 3', en:'Omega 3', opt:1000, fRo:'Peste', fEn:'Fish', mRo:'Peste', mEn:'Fish', ai:'AIRF|12m'},
        {ro:'🥚 B12', en:'B12', opt:2.4, fRo:'Oua', fEn:'Eggs', mRo:'Oua', mEn:'Eggs', ai:'BOIL|6m'},
        {ro:'🥕 Vitamina A', en:'Vitamin A', opt:900, fRo:'Morcovi', fEn:'Carrots', mRo:'Morcovi', mEn:'Carrots', ai:'STEAM|10m'},
        {ro:'🌽 Vitamina E', en:'Vitamin E', opt:15, fRo:'Nuci', fEn:'Nuts', mRo:'Nuci', mEn:'Nuts', ai:'RAW|0m'},
        {ro:'🔋 B6', en:'B6', opt:1.3, fRo:'Naut', fEn:'Chickpeas', mRo:'Naut', mEn:'Chickpeas', ai:'BOIL|20m'},
        {ro:'💪 Proteine', en:'Protein', opt:56, fRo:'Pui', fEn:'Chicken', mRo:'Pui', mEn:'Chicken', ai:'GRILL|15m'}
    ];

    async function initCam() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
            document.getElementById('v').srcObject = s;
        } catch(e) { console.log("Cam error"); }
    }
    initCam();

    function setupAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function toggleMute() {
        setupAudio();
        isMuted = !isMuted;
        document.getElementById('v-btn').innerText = isMuted ? '🔇' : '🔊';
        if (!isMuted) speak(curL === 'ro' ? "Sistem vocal activat" : "Voice enabled");
    }

    function speak(txt) {
        if (isMuted) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = curL === 'ro' ? 'ro-RO' : 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function playBeep(freq, dur) {
        if (isMuted || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function getRed() {
        const v = document.getElementById('v'), canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
        canvas.width = 10; canvas.height = 10;
        ctx.drawImage(v, 0, 0, 10, 10);
        const d = ctx.getImageData(0,0,10,10).data;
        let r = 0; for(let i=0; i<d.length; i+=4) r += d[i];
        return r/25; 
    }

    function startDeepScan() {
        setupAudio();
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(" "));
        if (isMuted) { alert(curL==='ro'?"Activează sunetul (🔊)!":"Turn on sound (🔊)!"); return; }
        
        let timeLeft = 10;
        const btn = document.getElementById('scan-btn'), laser = document.getElementById('laser-line'), status = document.getElementById('status-msg');
        btn.disabled = true; laser.style.display = 'block'; laser.style.animation = 'scanAnim 1.5s infinite linear';

        let timer = setInterval(() => {
            const r = getRed();
            // BIP doar dacă degetul este pus (Roșu > 100)
            if (r < 100) { 
                status.innerText = "⚠️ PUNEȚI DEGETUL PE CAMERĂ!";
                return; 
            }

            if (timeLeft > 0) {
                playBeep(880, 0.1); 
                status.innerText = (curL==='ro'?"SCANARE: ":"SCAN: ") + timeLeft + "s";
                timeLeft--;
            } else {
                clearInterval(timer); laser.style.display = 'none'; btn.disabled = false;
                finish(r);
            }
        }, 1000);
    }

    function finish(red) {
        document.getElementById('t-wrap').style.display = 'block';
        document.getElementById('wa-menu').style.display = 'grid';
        const body = document.getElementById('res-body');
        body.innerHTML = ''; lowMarkers = [];

        nutrients.forEach(n => {
            const real = (Math.random() * n.opt * 1.3).toFixed(1);
            const delta = (real - n.opt).toFixed(1);
            const isLow = parseFloat(real) < (n.opt * 0.8);
            if (isLow) lowMarkers.push(n);

            body.innerHTML += `<tr class="${isLow?'crit':''}">
                <td>${curL==='ro'?n.ro:n.en}</td>
                <td>${n.opt}</td>
                <td>${real}</td>
                <td class="${delta < 0 ? 'd-neg' : 'd-pos'}">${delta > 0 ? '+'+delta : delta}</td>
                <td>${isLow ? '⚠️ LOW' : '✅ OK'}</td>
            </tr>`;
        });

        // GENERĂM LINK-URILE DIRECTE CÂND SCANAREA E GATA (Metoda originală stabilă)
        const h = new Date().getHours(), period = (h < 11) ? "Mic Dejun" : (h < 18) ? "Pranz" : "Cina";
        
        // 1. Text Cumpărături
        const items = lowMarkers.map(m => curL==='ro'?m.fRo:m.fEn).join(", ");
        const shopTxt = "*LISTA CUMPARATURI AOH-V950*\n\nDe luat: " + (items || "Ingrediente");
        document.getElementById('btn-wa-shop').href = "https://wa.me" + encodeURIComponent(shopTxt);

        // 2. Text Meniu
        let cookTxt = "*MENIU " + period.toUpperCase() + " AI*\n\n";
        lowMarkers.forEach(m => {
            cookTxt += "🔹 *" + (curL==='ro'?m.mRo:m.mEn) + "*\n   CMD AI: " + m.ai + "\n\n";
        });
        document.getElementById('btn-wa-cook').href = "https://wa.me" + encodeURIComponent(cookTxt);

        speak(curL==='ro' ? "Scanare gata." : "Scan complete.");
    }

    function toggleP(id) {
        const p = document.getElementById('p-' + id);
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function setL(l) {
        curL = l;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        document.getElementById('f-'+l).classList.add('active');
        document.getElementById('ui-title').innerText = l==='ro'?'AOH-FOD V950: VITALITATE':'AOH-FOD V950: VITALITY';
    }
</script>
</body>
</html>
