<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AOH-FOD V900 | REPARAT</title>
    <style>
        :root { --neon-green: #0f0; --neon-red: #f00; --blue: #0088ff; }
        body { background: #000; color: #eee; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; overflow-x: hidden; padding-bottom: 60px; }
        .lang-bar { display: flex; justify-content: flex-end; gap: 12px; padding: 8px; align-items: center; }
        .vol-btn { background:none; border:1px solid var(--neon-green); color:var(--neon-green); border-radius:50%; width:35px; height:35px; cursor:pointer; margin-right: auto; font-size: 1rem; }
        .flag { font-size: 1.5rem; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .flag.active { opacity: 1; border-bottom: 2px solid var(--neon-green); transform: scale(1.1); }
        .header { border: 1px solid var(--neon-green); padding: 10px; border-radius: 10px; margin-bottom: 12px; font-size: 0.85rem; font-weight: bold; color: var(--neon-green); text-transform: uppercase; }
        .scanner-unit { width: 140px; height: 140px; margin: 0 auto 10px; border: 2px solid var(--neon-green); border-radius: 50%; overflow: hidden; position: relative; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .laser { position: absolute; width: 100%; height: 3px; background: var(--neon-red); top: 0; display: none; z-index: 10; box-shadow: 0 0 10px red; }
        @keyframes scanAnim { 0%, 100% { top: 10%; } 50% { top: 90%; } }
        .info-msg { font-size: 0.9rem; color: var(--neon-green); margin: 8px 0; min-height: 2.5rem; font-weight: bold; }
        
        /* TABEL CU SCROLL */
        .table-wrapper { display: none; max-height: 250px; overflow-y: auto; border: 1px solid #333; margin-top: 5px; border-radius: 8px; }
        table { width: 100%; font-size: 0.75rem; border-collapse: collapse; background: #050505; }
        th { position: sticky; top: 0; background: #111; color: var(--neon-green); padding: 12px 2px; border-bottom: 1px solid var(--neon-green); }
        td { border-bottom: 1px solid #222; padding: 12px 2px; text-align: center; }
        .crit { color: var(--neon-red); font-weight: bold; background: rgba(255,0,0,0.12); }
        .d-neg { color: var(--neon-red); font-weight: bold; }
        .d-pos { color: var(--neon-green); font-weight: bold; }

        /* BUTOANE WHATSAPP */
        .wa-area { display: none; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .wa-btn { padding: 16px 2px; border-radius: 35px; font-weight: bold; font-size: 0.75rem; color: white; text-decoration: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .bg-shop { background: var(--blue); }
        .bg-cook { background: #25D366; color: black; }
        
        .btn-main { width:100%; padding:20px; background:var(--neon-green); border:none; border-radius:35px; font-weight:bold; color:black; cursor:pointer; font-size: 1rem; box-shadow: 0 4px 10px rgba(0,255,0,0.3); }
        
        /* CELE 3 BUTOANE */
        .extra-line { display: flex; gap: 5px; margin-top: 15px; }
        .btn-small { flex:1; background: #111; border: 1px solid #333; color: #fff; font-size: 0.55rem; padding: 10px 2px; border-radius: 8px; text-transform: uppercase; cursor: pointer; }
        .panel { display: none; background: #0a0a0a; border: 1px solid #222; padding: 12px; margin-top: 8px; text-align: left; font-size: 0.8rem; color: var(--neon-green); }
    </style>
</head>
<body onclick="unlockAudio()">

<div class="lang-bar">
    <button id="v-btn" class="vol-btn" onclick="toggleMute()">🔇</button>
    <span class="flag active" id="f-ro" onclick="setL('ro')">🇷🇴</span>
    <span class="flag" id="f-en" onclick="setL('en')">🇺🇸</span>
</div>

<div class="header" id="ui-title">AOH-FOD V900: VITALITATE & LONGEVITATE</div>

<div class="scanner-unit">
    <div class="laser" id="laser-line"></div>
    <video id="v" autoplay playsinline muted></video>
</div>

<div class="info-msg" id="status-msg">ATINGE ECRANUL (🔊), APOI START</div>

<button id="scan-btn" class="btn-main" onclick="startDeepScan()">🧬 START SCANARE (10 SEC)</button>

<div class="table-wrapper" id="t-wrap">
    <table>
        <thead><tr><th>MARKER</th><th>OPTIM</th><th>REAL</th><th>DELTA</th><th>STARE</th></tr></thead>
        <tbody id="res-body"></tbody>
    </table>
</div>

<div id="wa-menu" class="wa-area">
    <button class="wa-btn bg-shop" onclick="doWA('shop')">🛒 CUMPĂRĂTURI</button>
    <button class="wa-btn bg-cook" onclick="doWA('cook')">👨‍🍳 MENIU AI</button>
</div>

<div class="extra-line">
    <button class="btn-small" onclick="toggleP('planet')">🌍 PLANETĂ</button>
    <button class="btn-small" onclick="toggleP('wallet')">💰 ECONOMIE</button>
    <button class="btn-small" style="color:#e9692c; border-color:#e9692c;" onclick="toggleP('tenis')">🎾 TENIS DEVA</button>
</div>

<div id="p-planet" class="panel">💧 Apă salvată: 75L | 🌿 CO2 evitat: 1.8kg.</div>
<div id="p-wallet" class="panel">💰 Economie lunară: 450 RON.</div>
<div id="p-tenis" class="panel">🎾 TENIS DEVA: Recuperare rapidă pentru performanță sportivă.</div>

<script>
    let curL = 'ro', isMuted = true, audioReady = false, lowMarkers = [];
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    const nutrients = [
        {ro:'💧 Hidratare', en:'💧 Hydration', opt:100, fRo:'500ml Apă', fEn:'500ml Water', mRo:'Apă', mEn:'Water', ai:'LIQ|0m'},
        {ro:'🍌 Potasiu', en:'🍌 Potassium', opt:4700, fRo:'2 Banane', fEn:'2 Bananas', mRo:'Smoothie', mEn:'Smoothie', ai:'BLND|2m'},
        {ro:'🎃 Magneziu', en:'Magnesium', opt:400, fRo:'50g Dovleac', fEn:'50g Pumpkin', mRo:'Supă', mEn:'Soup', ai:'STM|15m'},
        {ro:'🦴 Calciu', en:'Calcium', opt:1000, fRo:'100g Iaurt', fEn:'100g Yogurt', mRo:'Iaurt', mEn:'Yogurt', ai:'MIX|0m'},
        {ro:'🥩 Fier', en:'Iron', opt:18, fRo:'150g Spanac', fEn:'150g Spinach', mRo:'Sote', mEn:'Saute', ai:'SAUT|5m'},
        {ro:'🥦 Vitamina K', en:'Vitamin K', opt:120, fRo:'Brocoli', fEn:'Broccoli', mRo:'Abur', mEn:'Steam', ai:'STM|8m'},
        {ro:'🍋 Vitamina C', en:'Vitamin C', opt:90, fRo:'1 Lămâie', fEn:'1 Lemon', mRo:'Lămâie', mEn:'Lemon', ai:'EXT|1m'},
        {ro:'💊 Vitamina D3', en:'Vitamin D3', opt:2000, fRo:'D3', fEn:'D3', mRo:'D3', mEn:'D3', ai:'SUPP|0m'},
        {ro:'🥜 Zinc', en:'Zinc', opt:11, fRo:'30g Caju', fEn:'30g Cashews', mRo:'Caju', mEn:'Cashews', ai:'RAW|0m'},
        {ro:'🐟 Omega 3', en:'Omega 3', opt:1000, fRo:'Pește', fEn:'Fish', mRo:'Pește', mEn:'Fish', ai:'AIRF|12m'},
        {ro:'🥚 B12', en:'B12', opt:2.4, fRo:'Ouă', fEn:'Eggs', mRo:'Ouă', mEn:'Eggs', ai:'BOIL|6m'},
        {ro:'🥕 Vitamina A', en:'Vitamin A', opt:900, fRo:'Morcovi', fEn:'Carrots', mRo:'Morcovi', mEn:'Carrots', ai:'STM|10m'},
        {ro:'🌽 Vitamina E', en:'Vitamin E', opt:15, fRo:'Nuci', fEn:'Nuts', mRo:'Nuci', mEn:'Nuts', ai:'RAW|0m'},
        {ro:'🔋 B6', en:'B6', opt:1.3, fRo:'Năut', fEn:'Chickpeas', mRo:'Năut', mEn:'Chickpeas', ai:'BOIL|20m'},
        {ro:'💪 Proteine', en:'Protein', opt:56, fRo:'Pui', fEn:'Chicken', mRo:'Pui', mEn:'Chicken', ai:'GRILL|15m'}
    ];

    async function initCam() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
            document.getElementById('v').srcObject = s;
        } catch(e) { console.log("Cam error"); }
    }
    initCam();

    function unlockAudio() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!audioReady) {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(' '));
            audioReady = true;
        }
    }

    function toggleMute() {
        unlockAudio();
        isMuted = !isMuted;
        document.getElementById('v-btn').innerText = isMuted ? '🔇' : '🔊';
        if (!isMuted) speak(curL==='ro'?"Sistem activ":"System active");
    }

    function playBeep(freq, duration) {
        if(isMuted) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function speak(txt) {
        if(isMuted) return;
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(txt);
        m.lang = curL==='ro'?'ro-RO':'en-US';
        window.speechSynthesis.speak(m);
    }

    function startDeepScan() {
        unlockAudio();
        if(isMuted) { alert(curL==='ro'?"Activează sunetul!":"Turn on sound!"); return; }
        let btn = document.getElementById('scan-btn'), laser = document.getElementById('laser-line');
        let timeLeft = 10;
        btn.disabled = true; laser.style.display = 'block'; laser.style.animation = 'scanAnim 1.5s infinite linear';

        let timer = setInterval(() => {
            if (timeLeft > 0) {
                playBeep(880, 0.05);
                document.getElementById('status-msg').innerText = (curL==='ro'?'SCANARE: ':'SCANNING: ') + timeLeft + 's';
                timeLeft--;
            } else {
                clearInterval(timer);
                laser.style.display = 'none'; btn.disabled = false;
                finishScan();
            }
        }, 1000);
    }

    function finishScan() {
        document.getElementById('t-wrap').style.display = 'block';
        document.getElementById('wa-menu').style.display = 'grid';
        const body = document.getElementById('res-body');
        body.innerHTML = ''; lowMarkers = [];

        nutrients.forEach(n => {
            const real = (Math.random() * n.opt * 1.2).toFixed(1);
            const delta = (real - n.opt).toFixed(1);
            const isLow = parseFloat(real) < (n.opt * 0.8);
            if (isLow) lowMarkers.push(n);

            body.innerHTML += `<tr class="${isLow?'crit':''}">
                <td>${curL==='ro'?n.ro:n.en}</td><td>${n.opt}</td><td>${real}</td>
                <td class="${delta<0?'d-neg':'d-pos'}">${delta>0?'+'+delta:delta}</td>
                <td>${isLow?'⚠️ LOW':'✅ OK'}</td>
            </tr>`;
        });
        speak(curL==='ro'?"Scanare completă. Verificați deficitele.":"Scan complete. Check deficiencies.");
    }

    function doWA(type) {
        let text = "";
        const h = new Date().getHours(), period = (h<11)?"Mic Dejun":(h<18)?"Prânz":"Cină";
        if (type === 'shop') {
            const list = lowMarkers.map(m => curL==='ro'?m.fRo:m.fEn).join(", ");
            text = `🛒 *CUMPĂRĂTURI AOH-V900*\n\nDe luat: ${list || "Ingrediente"}`;
        } else {
            text = `👨‍🍳 *MENIU ${period.toUpperCase()} AI*\n\n`;
            lowMarkers.forEach(m => text += `🔹 *${curL==='ro'?m.mRo:m.mEn}*\n   CMD AI: \`${m.ai}\`\n\n`);
        }
        window.open(`https://wa.me{encodeURIComponent(text)}`, '_blank');
    }

    function toggleP(id) {
        const p = document.getElementById('p-' + id);
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function setL(l) {
        curL = l;
        document.querySelectorAll('.flag').forEach(f => f.classList.remove('active'));
        document.getElementById('f-'+l).classList.add('active');
    }
</script>
</body>
</html>
