<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AOH-FOD V1100</title>
    
    <!-- INSTRUCTIUNI PENTRU ICONITA AUTOMATA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AOH-FOD">
    <!-- Generăm iconița direct din cod (SVG Verde Neon pe Negru) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><text y='70' x='20' font-family='serif' font-size='70' fill='lime'>A</text><line x1='0' y1='50' x2='100' y2='50' stroke='red' stroke-width='4'/></svg>">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><rect width='100' height='100' fill='black'/><text y='70' x='20' font-family='serif' font-size='70' fill='lime'>A</text><line x1='0' y1='50' x2='100' y2='50' stroke='red' stroke-width='4'/></svg>">

    <style>
        :root { --green: #0f0; --red: #f00; --blue: #0088ff; }
        body { background: #000; color: #eee; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        
        /* SPLASH SCREEN */
        #splash { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: 0.8s; }
        .logo-anim { width:80px; height:80px; border:3px solid var(--green); display:flex; align-items:center; justify-content:center; position:relative; box-shadow: 0 0 15px var(--green); margin-bottom: 20px; }
        
        /* SCANNER & UI */
        .header { border: 2px solid var(--green); padding: 10px; border-radius: 10px; color: var(--green); font-weight: bold; margin-bottom: 15px; font-size: 0.8rem; }
        .scanner { width: 120px; height: 120px; border: 2px solid var(--green); border-radius: 50%; margin: 0 auto 15px; overflow: hidden; position: relative; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        .laser { position: absolute; width: 100%; height: 2px; background: var(--red); top: 50%; box-shadow: 0 0 10px red; display: none; animation: scanAnim 2s infinite; }
        @keyframes scanAnim { 0%, 100% { top: 20%; } 50% { top: 80%; } }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #050505; font-size: 0.75rem; }
        th { color: var(--green); padding: 10px; border-bottom: 1px solid var(--green); }
        td { padding: 12px 4px; border-bottom: 1px solid #111; }
        tr:nth-child(even) { background: #0a0a0a; }
        .crit { color: var(--red); font-weight: bold; }
        
        .btn-main { width: 100%; padding: 20px; background: var(--green); border: none; border-radius: 40px; font-weight: bold; font-size: 1rem; margin: 15px 0; cursor: pointer; }
        .wa-area { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .wa { padding: 15px; border-radius: 30px; color: #fff; text-decoration: none; font-weight: bold; font-size: 0.7rem; }
        
        .panel-btn { background: #111; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 8px; flex: 1; font-size: 0.65rem; }
        .panel { display: none; padding: 15px; border: 1px solid #222; margin-top: 10px; border-radius: 10px; text-align: left; font-size: 0.8rem; color: var(--green); }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-anim"><span style="font-size:40px; color:var(--green)">A</span><div style="position:absolute; width:100%; height:2px; background:red;"></div></div>
    <div style="color:var(--green); letter-spacing:3px;">AOH-FOD V1100</div>
</div>

<div class="header">AOH-FOD: BIO-OPTIMIZARE UNIVERSALĂ</div>

<div class="scanner"><div id="lsr" class="laser"></div><video id="v" autoplay playsinline muted></video></div>

<button id="s-btn" class="btn-main" onclick="startScan()">🧬 START SCANARE BIOMETRICĂ</button>

<table id="res-t" style="display:none;">
    <thead><tr><th align="left">MARKER</th><th>OPTIM</th><th>REAL</th><th align="right">DELTA</th></tr></thead>
    <tbody id="res-b"></tbody>
</table>

<div class="wa-area">
    <a id="w-shop" href="#" class="wa" style="background:var(--blue)">🛒 CUMPĂRĂTURI</a>
    <a id="w-cook" href="#" class="wa" style="background:#25D366; color:#000">👨‍🍳 MENIU REPARARE</a>
</div>

<div style="display:flex; gap:5px; margin-top:20px;">
    <button class="panel-btn" onclick="tgl('p-pl')">🌍 PLANETĂ</button>
    <button class="panel-btn" onclick="tgl('p-ec')">💰 ECONOMIE</button>
    <button class="panel-btn" onclick="tgl('p-tn')" style="color:#e9692c;">🎾 TENIS DEVA</button>
</div>
<div id="p-pl" class="panel">🌍 IMPACT: Consum de precizie. Risipă zero.</div>
<div id="p-ec" class="panel">💰 ECONOMIE: Cumperi doar gramajul indicat de Delta.</div>
<div id="p-tn" class="panel">🎾 TENIS DEVA: Optimizare Magneziu pentru anduranță.</div>

<script>
// DATELE CELOR 20 DE NUTRIENTI (SIMPLIFICAT)
const nutrients = [
    {ro:'💧 Hidratare', opt:100, u:'%', f:'Apă/Lămâie', r:{mic_dejun:{m:'Apă Lămâie',a:'LIQ|0m'},pranz:{m:'Infuzie',a:'STW|5m'},cina:{m:'Ceai',a:'STW|5m'}}},
    {ro:'🔥 Magneziu', opt:400, u:'mg', f:'Dovleac', r:{mic_dejun:{m:'Smoothie',a:'BLND|2m'},pranz:{m:'Supă Dovleac',a:'STM|15m'},cina:{m:'Semințe',a:'AIRF|5m'}}},
    {ro:'🦴 Calciu', opt:1000, u:'mg', f:'Iaurt', r:{mic_dejun:{m:'Bol Iaurt',a:'MIX|0m'},pranz:{m:'Tahini',a:'CUT|2m'},cina:{m:'Chia',a:'MIX|2m'}}},
    {ro:'🥩 Fier', opt:18, u:'mg', f:'Spanac', r:{mic_dejun:{m:'Omletă Spanac',a:'FRY|6m'},pranz:{m:'Sote Spanac',a:'SAUT|5m'},cina:{m:'Ficat',a:'GRL|10m'}}},
    {ro:'🐟 Omega 3', opt:1000, u:'mg', f:'Pește', r:{mic_dejun:{m:'Budincă In',a:'MIX|1m'},pranz:{m:'Somon Abur',a:'STM|12m'},cina:{m:'Păstrăv',a:'AIRF|15m'}}},
    {ro:'🥦 Vitamina K', opt:120, u:'µg', f:'Brocoli', r:{mic_dejun:{m:'Smoothie Kale',a:'BLND|3m'},pranz:{m:'Sote Brocoli',a:'STM|8m'},cina:{m:'Chips Kale',a:'AIRF|10m'}}},
    {ro:'🧠 Vitamina B12', opt:2.4, u:'µg', f:'Ouă', r:{mic_dejun:{m:'Ouă Moi',a:'BOIL|6m'},pranz:{m:'Ficat Abur',a:'STM|10m'},cina:{m:'Curcan Grill',a:'GRL|12m'}}},
    {ro:'🛡️ Vitamina D3', opt:2000, u:'UI', f:'Ciuperci', r:{mic_dejun:{m:'Ciuperci Sote',a:'SAUT|5m'},pranz:{m:'Păstrăv',a:'AIRF|15m'},cina:{m:'Salată Ou',a:'BOIL|8m'}}},
    {ro:'🥕 Vitamina A', opt:900, u:'µg', f:'Morcovi', r:{mic_dejun:{m:'Suc Morcov',a:'EXT|2m'},pranz:{m:'Morcovi Abur',a:'STM|10m'},cina:{m:'Supă Cremă',a:'BLND|5m'}}},
    {ro:'💪 Proteine', opt:56, u:'g', f:'Pui', r:{mic_dejun:{m:'Ouă Poșate',a:'BOIL|4m'},pranz:{m:'Pui la Abur',a:'STM|15m'},cina:{m:'Mazăre Sote',a:'SAUT|10m'}}},
    {ro:'🔋 Vitamina B1', opt:1.2, u:'mg', f:'Mazăre', r:{mic_dejun:{m:'Terci Porumb',a:'BOIL|10m'},pranz:{m:'Mazăre Sote',a:'SAUT|8m'},cina:{m:'Mix Semințe',a:'RAW|0m'}}},
    {ro:'🧬 Vitamina B3', opt:16, u:'mg', f:'Curcan', r:{mic_dejun:{m:'Unt Arahide',a:'MIX|0m'},pranz:{m:'Curcan Abur',a:'STM|15m'},cina:{m:'Ton Natur',a:'OPEN|1m'}}},
    {ro:'🍋 Vitamina C', opt:90, u:'mg', f:'Ardei', r:{mic_dejun:{m:'Shot Cătină',a:'EXT|1m'},pranz:{m:'Salată Ardei',a:'CUT|2m'},cina:{m:'Infuzie Citrice',a:'STW|3m'}}},
    {ro:'🥜 Zinc', opt:11, u:'mg', f:'Caju', r:{mic_dejun:{m:'Terci Caju',a:'MIX|3m'},pranz:{m:'Mix Dovleac',a:'SAUT|4m'},cina:{m:'Topping Semințe',a:'GRND|1m'}}},
    {ro:'🧬 Seleniu', opt:55, u:'µg', f:'Nuci Brazilia', r:{mic_dejun:{m:'Nuci Raw',a:'RAW|0m'},pranz:{m:'Topping Salată',a:'GRND|1m'},cina:{m:'Gustare Antiox',a:'RAW|0m'}}},
    {ro:'🧂 Iod', opt:150, u:'µg', f:'Sare Iodată', r:{mic_dejun:{m:'Ou Fiert',a:'BOIL|6m'},pranz:{m:'Salată Alge',a:'RAW|0m'},cina:{m:'Pește Alb',a:'STM|10m'}}},
    {ro:'🌿 B9 (Folați)', opt:400, u:'µg', f:'Linte', r:{mic_dejun:{m:'Smoothie Verde',a:'BLND|2m'},pranz:{m:'Supă Linte',a:'STW|25m'},cina:{m:'Sparanghel Abur',a:'STM|6m'}}},
    {ro:'🌾 Fibre', opt:30, u:'g', f:'Ovăz', r:{mic_dejun:{m:'Terci Ovăz',a:'BOIL|5m'},pranz:{m:'Tocăniță Legume',a:'STW|20m'},cina:{m:'Salată Raw',a:'CUT|5m'}}},
    {ro:'🔋 Vitamina B6', opt:1.3, u:'mg', f:'Năut', r:{mic_dejun:{m:'Hummus',a:'BLND|3m'},pranz:{m:'Năut Fiert',a:'BOIL|20m'},cina:{m:'Cartof Dulce',a:'AIRF|15m'}}},
    {ro:'🌽 Vitamina E', opt:15, u:'mg', f:'Semințe', r:{mic_dejun:{m:'Mix Semințe',a:'RAW|0m'},pranz:{m:'Ulei Rece',a:'MIX|0m'},cina:{m:'Migdale',a:'RAW|0m'}}}
];

window.onload = () => { setTimeout(() => { document.getElementById('splash').style.opacity='0'; setTimeout(() => document.getElementById('splash').style.display='none', 800); }, 2500); initCam(); };

async function initCam() { try { const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}); document.getElementById('v').srcObject = s; } catch(e){} }

function startScan() {
    const b = document.getElementById('s-btn'); const l = document.getElementById('lsr');
    b.disabled = true; b.innerText = "SCANARE BIOMETRICĂ..."; l.style.display="block";
    setTimeout(() => { l.style.display="none"; b.disabled=false; b.innerText="🧬 START SCANARE BIOMETRICĂ"; calc(); }, 3000);
}

function calc() {
    const h = new Date().getHours();
    const iv = (h>=5 && h<11) ? 'mic_dejun' : (h>=11 && h<17 ? 'pranz' : 'cina');
    let sm = `🛒 AOH SHOP [${new Date().toLocaleTimeString()}]\n---\n`;
    let cm = `👨‍🍳 MENIU [${iv.toUpperCase()}] - ${new Date().toLocaleTimeString()}\n---\n`;
    const tb = document.getElementById('res-b'); tb.innerHTML = ''; document.getElementById('res-t').style.display="table";
    
    nutrients.forEach(n => {
        let rVal = Math.floor(n.opt * (0.4 + Math.random() * 0.45));
        let d = n.opt - rVal;
        if(d > 0) {
            sm += `• ${n.f}: +${d} ${n.u}\n`;
            cm += `▶️ ${n.r[iv].m} (${n.r[iv].a})\n`;
        }
        tb.innerHTML += `<tr><td align="left" style="color:#888">${n.ro}</td><td>${n.opt}</td><td>${rVal}</td><td align="right" class="${d>0?'crit':''}">+${d} ${n.u}</td></tr>`;
    });
    
    document.getElementById('w-shop').href = "whatsapp://send?text=" + encodeURIComponent(sm);
    document.getElementById('w-cook').href = "whatsapp://send?text=" + encodeURIComponent(cm);
}

function tgl(id) { 
    const p = document.getElementById(id);
    const v = p.style.display === 'block';
    document.querySelectorAll('.panel').forEach(x => x.style.display='none');
    p.style.display = v ? 'none' : 'block';
}
</script>
</body>
</html>
